# Small, fast overrides for the CI train-smoke test (synthetic data).
data:
  synthetic_rows: 5000
supervised:
  n_estimators: 80
anomaly:
  detectors: [iforest]   # no Torch in the CI image
  loao_min_samples: 30
seed_variance:
  n_seeds: 3             # 4 refits total (incl. the same-seed repro check) is plenty for CI
retrain_policy:
  n_batches: 4           # the tiny stream still exercises every trigger path
refresh:
  n_batches: 4           # match the retrain-policy stream at CI scale
adaptive_conformal:
  window: 200            # the 5k-row smoke's test stream needs smaller coverage windows
exemplars:
  per_class: 50          # a compact case base is plenty to exercise the retrieval
leaderboard:
  families: [majority, logistic, gbdt]  # one linear + the deployed family is enough smoke
selftrain:
  max_pseudo_per_class: 2000
sanitize:
  flip_rates: [0.0, 0.25]  # two points exercise both the tax and the recovery branch
  max_rows: 3000
dp:
  noise_multipliers: [0.0, 1.0, 4.0]  # non-private + two budgets exercises the frontier
  target_train_rows: 1500
  eval_rows: 800
  epochs: 20
transfer:
  label_budgets: [50, 500]  # one starved budget + one that begins to hold
  n_resamples: 5
socsim:
  n_runs: 3                # medians over 3 draws are enough to exercise the queue
  arrivals_per_shift: 120
  analyst_counts: [2, 4]   # one saturated setting + one nearer capacity
gate:
  min_tpr_at_primary_fpr: 0.0  # the 5k-row smoke is about the structural checks
  max_ece: 1.0
mlflow:
  enabled: false         # use the local file logger in CI
