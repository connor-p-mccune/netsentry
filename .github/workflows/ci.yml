name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff + black)
        run: |
          python -m ruff check netsentry tests
          python -m black --check netsentry tests
      - name: Typecheck (mypy)
        run: python -m mypy netsentry
      - name: Test (fast)
        run: python -m pytest -m "not slow" --cov=netsentry --cov-report=term-missing

  train-smoke:
    name: train smoke test (synthetic) + slow tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (dev + train extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,train]"
      - name: End-to-end pipeline on a tiny synthetic dataset
        run: |
          python -m netsentry.cli download -o configs/ci.yaml
          python -m netsentry.cli prep -o configs/ci.yaml
          python -m netsentry.cli validate -o configs/ci.yaml
          python -m netsentry.cli train tune -o configs/ci.yaml --trials 3
          python -m netsentry.cli train supervised -o configs/ci.yaml
          python -m netsentry.cli eval -o configs/ci.yaml
          python -m netsentry.cli train anomaly -o configs/ci.yaml
      - name: Packet-to-verdict smoke (demo pcap -> flows -> scored -> incidents)
        run: |
          python -m netsentry.cli pcap --demo -o configs/ci.yaml --input demo.pcap --output pcap_scored.csv --flows-out demo_flows.csv
          python -m netsentry.cli incident -o configs/ci.yaml --input demo_flows.csv --output incident_report.md --profile fpr_1pct
      - name: Analysis suite (cost · conformal · robustness · rules · ablation · subgroups)
        run: |
          python -m netsentry.cli cost -o configs/ci.yaml
          python -m netsentry.cli conformal -o configs/ci.yaml
          python -m netsentry.cli robustness -o configs/ci.yaml
          python -m netsentry.cli rules -o configs/ci.yaml
          python -m netsentry.cli ablation -o configs/ci.yaml
          python -m netsentry.cli subgroups -o configs/ci.yaml
      - name: Advanced suite (harden · alertqueue · driftscan · navigator)
        run: |
          python -m netsentry.cli harden -o configs/ci.yaml
          python -m netsentry.cli alertqueue -o configs/ci.yaml
          python -m netsentry.cli driftscan -o configs/ci.yaml
          python -m netsentry.cli navigator -o configs/ci.yaml
      - name: Honest-protocol studies (leaderboard · selftrain · campaigns)
        run: |
          python -m netsentry.cli leaderboard -o configs/ci.yaml
          python -m netsentry.cli selftrain -o configs/ci.yaml
          python -m netsentry.cli campaigns -o configs/ci.yaml
      - name: Adaptive-operation studies (baserate · adaptiveconformal · refresh · exemplars)
        run: |
          python -m netsentry.cli baserate -o configs/ci.yaml
          python -m netsentry.cli adaptiveconformal -o configs/ci.yaml
          python -m netsentry.cli refresh -o configs/ci.yaml
          python -m netsentry.cli exemplars -o configs/ci.yaml
      - name: Defense & operations studies (sanitize · transfer · socsim)
        run: |
          python -m netsentry.cli sanitize -o configs/ci.yaml
          python -m netsentry.cli transfer -o configs/ci.yaml
          python -m netsentry.cli socsim -o configs/ci.yaml
      - name: Model lifecycle (seeds · gate · promote · retrainpolicy)
        run: |
          python -m netsentry.cli seeds -o configs/ci.yaml
          python -m netsentry.cli gate -o configs/ci.yaml
          python -m netsentry.cli promote -o configs/ci.yaml
          python -m netsentry.cli retrainpolicy -o configs/ci.yaml
      - name: Model-integrity gate (SBOM + manifest, verify bytes, replay canaries)
        run: |
          python -m netsentry.cli provenance -o configs/ci.yaml
          python -m netsentry.cli verify -o configs/ci.yaml
          python -m netsentry.cli canary -o configs/ci.yaml --bundle models/champion.joblib
      - name: Slow integration tests
        run: python -m pytest -m slow

  security:
    name: dependency audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install -e ".[dev]"
          pip-audit

  docker:
    name: build serving image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build serve image
        run: docker build -f docker/Dockerfile.serve -t netsentry-serve:ci .
