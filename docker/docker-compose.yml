# Run the NetSentry inference API:  docker compose -f docker/docker-compose.yml up --build
# On first start (no mounted bundle) it builds a synthetic demo model, then serves.
services:
  serve:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    image: netsentry-serve
    ports:
      - "8000:8000"
    environment:
      NETSENTRY_SERVING__PORT: "8000"
      NETSENTRY_LOG_JSON: "1"
    volumes:
      # Mount a pre-trained bundle here to skip the synthetic bootstrap.
      - ../models:/app/models
      - ../data:/app/data
    restart: unless-stopped

  # Observability stack (Prometheus + Grafana). Bring it up with:
  #   docker compose -f docker/docker-compose.yml --profile monitoring up --build
  # Grafana: http://localhost:3000 (admin/admin) with the NetSentry dashboard
  # auto-provisioned; Prometheus: http://localhost:9090.
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - serve
    profiles: ["monitoring"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles: ["monitoring"]
    restart: unless-stopped

  # Optional MLflow tracking UI. Point training at it with
  # NETSENTRY_MLFLOW__TRACKING_URI=http://mlflow:5000
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlflow
    profiles: ["tracking"]
