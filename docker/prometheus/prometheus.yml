# Prometheus scrape config for the NetSentry inference API.
# Brought up by the docker-compose "monitoring" profile:
#   docker compose -f docker/docker-compose.yml --profile monitoring up --build
global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: netsentry
    metrics_path: /metrics
    static_configs:
      - targets: ["serve:8000"]
        labels:
          service: netsentry
