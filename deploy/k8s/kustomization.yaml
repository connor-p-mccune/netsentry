apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy the NetSentry inference API without Helm:
#   kubectl create namespace netsentry
#   kubectl -n netsentry apply -k deploy/k8s
#
# The ServiceMonitor is listed separately because it needs the Prometheus Operator
# CRDs; drop it from `resources` if the cluster does not run kube-prometheus-stack.
namespace: netsentry

resources:
  - service.yaml
  - deployment.yaml
  - hpa.yaml
  - servicemonitor.yaml

commonLabels:
  app.kubernetes.io/part-of: netsentry

images:
  - name: netsentry-serve
    newTag: "0.8.0"
