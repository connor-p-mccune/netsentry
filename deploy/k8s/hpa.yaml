apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netsentry
  labels:
    app.kubernetes.io/name: netsentry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netsentry
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: netsentry
  labels:
    app.kubernetes.io/name: netsentry
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netsentry
