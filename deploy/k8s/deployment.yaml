apiVersion: apps/v1
kind: Deployment
metadata:
  name: netsentry
  labels:
    app.kubernetes.io/name: netsentry
    app.kubernetes.io/component: inference-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: netsentry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netsentry
        app.kubernetes.io/component: inference-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: netsentry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netsentry
          image: netsentry-serve:0.8.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: NETSENTRY_LOG_JSON
              value: "1"
            - name: NETSENTRY_SERVING__PORT
              value: "8000"
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
      volumes:
        # Replace with a persistentVolumeClaim holding a trained bundle in production;
        # the emptyDir triggers the image's first-boot synthetic-bundle bootstrap.
        - name: models
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
