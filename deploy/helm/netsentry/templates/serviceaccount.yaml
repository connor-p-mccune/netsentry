{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "netsentry.serviceAccountName" . }}
  labels:
    {{- include "netsentry.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The inference service needs no Kubernetes API access.
automountServiceAccountToken: false
{{- end }}
