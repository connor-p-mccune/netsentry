{{- if and .Values.apiKey.enabled (not .Values.apiKey.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netsentry.apiKeySecretName" . }}
  labels:
    {{- include "netsentry.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.apiKey.secretKey }}: {{ required "apiKey.value is required when apiKey.enabled and no existingSecret is set" .Values.apiKey.value | quote }}
{{- end }}
